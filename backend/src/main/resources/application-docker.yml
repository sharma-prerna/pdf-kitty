# Overrides applied when SPRING_PROFILES_ACTIVE=docker.
# Connection values come from environment variables defined in docker-compose.yml.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

# LibreOffice is installed in the backend image, so enable the office manager here.
jodconverter:
  local:
    enabled: ${JODCONVERTER_ENABLED:true}
    office-home: ${LIBREOFFICE_HOME:/usr/lib/libreoffice}
    max-tasks-per-process: 50
    process-timeout: 120000
    task-execution-timeout: 120000

app:
  storage:
    base-dir: ${STORAGE_BASE_DIR:/data/storage}
  cors:
    allowed-origins:
      - http://localhost:3000
