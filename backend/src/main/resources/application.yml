spring:
  application:
    name: pdf-toolkit-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      max-file-size: ${APP_FILE_MAX_SIZE_MB:50}MB
      max-request-size: ${APP_FILE_MAX_REQUEST_MB:200}MB
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Flyway is the schema source of truth. 'none' avoids JDBC type-code mismatches on
      # timestamptz columns during validation; switch to 'validate' once verified locally.
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    schemas: public
    default-schema: public
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  file:
    max-size-mb: ${APP_FILE_MAX_SIZE_MB:50}
  storage:
    base-dir: ${STORAGE_BASE_DIR:./data/storage}
  rate-limit:
    enabled: true
    requests: ${APP_RATE_LIMIT_REQUESTS:60}
    window-seconds: ${APP_RATE_LIMIT_WINDOW_SECONDS:60}
  security:
    jwt-secret: ${APP_SECURITY_JWT_SECRET:change-me-please-change-me-please-change-me-32+}
    jwt-expiration-ms: ${APP_SECURITY_JWT_EXPIRATION_MS:3600000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://pdf-kitty-frontend-womz.onrender.com}

logging:
  level:
    com.pdftoolkit: INFO

# LibreOffice is installed in the backend image, so enable the office manager here.
jodconverter:
  prod:
    enabled: ${JODCONVERTER_ENABLED:true}
    office-home: ${LIBREOFFICE_HOME:/usr/lib/libreoffice}
    max-tasks-per-process: 50
    process-timeout: 120000
    task-execution-timeout: 120000
